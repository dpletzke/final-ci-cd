name: Deploy Monitoring Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy monitoring to'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-monitoring:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.6'

      - name: Terraform Init (Monitoring)
        working-directory: infra/monitoring
        env:
          TF_VAR_environment_name: ${{ github.event.inputs.environment }}
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          AWS_REGION: us-east-1
        run: |
          STATE_KEY="final-ci-cd/${{ github.event.inputs.environment }}/monitoring.tfstate"
          terraform init \
            -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${STATE_KEY}" \
            -backend-config="region=us-east-1"

      - name: Terraform Validate
        working-directory: infra/monitoring
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra/monitoring
        env:
          TF_VAR_environment_name: ${{ github.event.inputs.environment }}
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')
          terraform plan \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Terraform Apply
        working-directory: infra/monitoring
        env:
          TF_VAR_environment_name: ${{ github.event.inputs.environment }}
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')
          terraform apply -auto-approve \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Output Monitoring URLs
        working-directory: infra/monitoring
        run: |
          echo "=== Monitoring Infrastructure URLs ==="
          terraform output -raw mlflow_url
          terraform output -raw prometheus_url
          terraform output -raw grafana_url
